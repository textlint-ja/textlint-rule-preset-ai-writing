name: Release

on:
  pull_request:
    branches:
      - master
      - main
    types:
      - closed
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.2.3)'
        required: false
        type: string

jobs:
  release:
    if: |
      (github.event_name == 'pull_request' && 
       github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'Type: Release')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # OIDC
      pull-requests: write  # PR comment
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      
      - name: Get package info
        id: package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${GITHUB_EVENT_INPUTS_VERSION}" ]; then
            VERSION="${GITHUB_EVENT_INPUTS_VERSION}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT
        env:
          GITHUB_EVENT_INPUTS_VERSION: ${{ github.event.inputs.version }}
      
      - name: Check if tag exists
        id: tag-check
        run: |
          if git rev-parse "v${STEPS_PACKAGE_OUTPUTS_VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          STEPS_PACKAGE_OUTPUTS_VERSION: ${{ steps.package.outputs.version }}
      
      - name: Setup Node.js
        if: steps.tag-check.outputs.exists == 'false'
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3.9.1
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.tag-check.outputs.exists == 'false'
        run: npm ci
      
      - name: Build package
        if: steps.tag-check.outputs.exists == 'false'
        run: npm run build
      
      - name: Publish to npm with provenance
        if: steps.tag-check.outputs.exists == 'false'
        run: npm publish --provenance --access public
      
      - name: Create GitHub Release with tag
        id: create-release
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RELEASE_URL=$(gh release create "v${STEPS_PACKAGE_OUTPUTS_VERSION}" \
              --title "v${STEPS_PACKAGE_OUTPUTS_VERSION}" \
              --target "${{ github.sha }}" \
              --generate-notes)
          else
            RELEASE_URL=$(gh release create "v${STEPS_PACKAGE_OUTPUTS_VERSION}" \
              --title "v${STEPS_PACKAGE_OUTPUTS_VERSION}" \
              --target "${{ github.sha }}" \
              --notes "${GITHUB_EVENT_PULL_REQUEST_BODY}")
          fi
          echo "url=$RELEASE_URL" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}
          STEPS_PACKAGE_OUTPUTS_VERSION: ${{ steps.package.outputs.version }}
          GITHUB_EVENT_PULL_REQUEST_BODY: ${{ github.event.pull_request.body }}
      
      - name: Comment on PR - Success
        if: |
          always() && 
          github.event_name == 'pull_request' && 
          steps.tag-check.outputs.exists == 'false' &&
          success()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "✅ **Release v${STEPS_PACKAGE_OUTPUTS_VERSION} completed successfully!**
          
          - 📦 npm package: https://www.npmjs.com/package/${STEPS_PACKAGE_OUTPUTS_NAME}/v/${STEPS_PACKAGE_OUTPUTS_VERSION}
          - 🏷️ GitHub Release: ${STEPS_CREATE_RELEASE_OUTPUTS_URL}
          - 🔗 Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ github.token }}
          STEPS_PACKAGE_OUTPUTS_VERSION: ${{ steps.package.outputs.version }}
          STEPS_PACKAGE_OUTPUTS_NAME: ${{ steps.package.outputs.name }}
          STEPS_CREATE_RELEASE_OUTPUTS_URL: ${{ steps.create-release.outputs.url }}
      
      - name: Comment on PR - Failure
        if: |
          always() && 
          github.event_name == 'pull_request' && 
          steps.tag-check.outputs.exists == 'false' &&
          failure()
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "❌ **Release v${STEPS_PACKAGE_OUTPUTS_VERSION} failed**
          
          Please check the workflow logs for details.
          🔗 Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ github.token }}
          STEPS_PACKAGE_OUTPUTS_VERSION: ${{ steps.package.outputs.version }}